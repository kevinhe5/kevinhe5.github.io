<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PagedAttention — Step by Step</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef0fc;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 12px}

/* Top bar */
#topbar{display:flex;align-items:center;justify-content:space-between;width:960px;max-width:100%;margin-bottom:14px}
h1{font-size:1.2rem;color:#1a1d3e;font-weight:700}
#step-pill{background:#4f5ff8;color:#fff;font-size:.76rem;font-weight:700;padding:5px 14px;border-radius:20px}

/* Stage */
#stage{
  position:relative;
  width:960px;max-width:100%;height:450px;
  background:#fff;border-radius:16px;
  box-shadow:0 4px 32px #1a1d3e1a;
  display:flex;
  overflow:hidden;
}

/* Left panel */
#left-panel{
  width:295px;flex-shrink:0;
  padding:15px 15px;
  display:flex;flex-direction:column;gap:8px;
  overflow:hidden;
}
.panel-label{font-size:10px;font-weight:700;color:#aab;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}

/* Divider */
#divider{width:1px;background:#e8eaf6;flex-shrink:0}

/* Right panel */
#right-panel{
  flex:1;padding:15px 15px;
  display:flex;flex-direction:column;
  gap:7px;
}

/* Free pool */
#free-pool{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
}
.fp-chip{
  padding:2px 5px;border-radius:4px;
  font-size:8px;font-weight:700;
  background:#e8f5e9;border:1.2px solid #43a047;color:#2e7d32;
  transition:opacity 280ms ease;
  white-space:nowrap;
}
.fp-chip.gone{opacity:0;pointer-events:none}

/* Separator */
.sep{height:1px;background:#e8eaf6;flex-shrink:0}

/* Grid header */
#grid-header{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#grid-note{font-size:9px;color:#bbb}

/* Physical block grid */
#phys-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  flex:1;
}
.pb{
  border-radius:7px;border:1.5px solid #d4d8f0;background:#f5f6fc;
  padding:5px 6px;
  display:flex;flex-direction:column;gap:3px;
  transition:background 350ms ease, border-color 350ms ease, box-shadow 350ms ease;
}
.pb.r1{background:#dbeeff;border-color:#1e88e5}
.pb.r2{background:#fff3e0;border-color:#f57c00}
.pb.new-glow{box-shadow:0 0 0 3px #f9a82566,0 0 18px #f9a82533}
.pb.pulse{animation:blockPulse 500ms ease-out}
@keyframes blockPulse{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}

.pb-head{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pb-id{font-size:8px;font-weight:700;color:#bbb}
.pb.r1 .pb-id{color:#1e88e5}
.pb.r2 .pb-id{color:#f57c00}
.pb-owner{font-size:7px;font-weight:600;color:#ccc}
.pb.r1 .pb-owner{color:#1565c0}
.pb.r2 .pb-owner{color:#e65100}

.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;flex:1}
.kv-slot{
  border-radius:3px;background:#e4e8f4;
  min-height:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:6px;font-weight:700;color:transparent;
  transition:background 250ms ease, color 200ms ease;
}
.kv-slot.filled{color:#fff}
.kv-slot.pop{animation:slotPop 300ms cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.pb.r1 .kv-slot.filled{background:#1e88e5}
.pb.r2 .kv-slot.filled{background:#f57c00}

/* Request cards */
.req-card{
  border-radius:8px;border:1.5px solid transparent;
  padding:9px 11px;
  opacity:0;transform:translateY(10px);
  transition:opacity 350ms ease, transform 350ms ease;
  flex-shrink:0;
}
.req-card.show{opacity:1;transform:translateY(0)}
.req-card.r1{border-color:#1e88e5;background:#f4f9ff}
.req-card.r2{border-color:#f57c00;background:#fffaf4}
.req-title{font-size:11px;font-weight:700;margin-bottom:6px}
.r1 .req-title{color:#1e88e5}
.r2 .req-title{color:#f57c00}

.tokens-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.tok{
  padding:2px 5px;border-radius:4px;
  font-size:9px;font-weight:700;border:1.2px solid;
  opacity:0;transform:scale(.5);
  transition:opacity 180ms ease, transform 180ms ease;
}
.tok.show{opacity:1;transform:scale(1)}
.tok.highlight{animation:tokPulse 380ms ease-out}
@keyframes tokPulse{0%{transform:scale(1)}45%{transform:scale(1.55)}100%{transform:scale(1)}}

.bt-section-label{font-size:9px;color:#aaa;font-weight:600;margin-bottom:2px}
.bt-row{display:flex;align-items:center;gap:5px;margin-top:3px}
.bt-lb{
  padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;border:1.2px solid;
  flex-shrink:0;
}
.r1 .bt-lb{border-color:#1e88e5;color:#1e88e5;background:#dbeeff}
.r2 .bt-lb{border-color:#f57c00;color:#f57c00;background:#fff3e0}
.bt-arr{color:#bbb;font-size:11px;flex-shrink:0}
.bt-pb{
  padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;
  background:#f0f2fa;color:#ccc;border:1.2px solid #e0e4f0;
  transition:all 300ms ease;
  flex-shrink:0;
}
.bt-pb.set.r1{background:#dbeeff;color:#1e88e5;border-color:#1e88e5}
.bt-pb.set.r2{background:#fff3e0;color:#f57c00;border-color:#f57c00}

/* Flying chip */
.floater{
  position:absolute;
  z-index:200;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;
  pointer-events:none;
  box-shadow:0 4px 16px #0002;
  transition:
    left   680ms cubic-bezier(.25,.8,.25,1),
    top    680ms cubic-bezier(.25,.8,.25,1),
    width  680ms cubic-bezier(.25,.8,.25,1),
    height 680ms cubic-bezier(.25,.8,.25,1),
    border-radius 680ms ease,
    opacity 200ms ease;
}

/* Desc + controls */
#desc-box{
  width:960px;max-width:100%;margin-top:12px;
  padding:12px 18px;background:#fff;
  border-radius:10px;border-left:4px solid #4f5ff8;
  box-shadow:0 2px 10px #1a1d3e0d;
  font-size:.86rem;line-height:1.65;color:#2a2d4e;min-height:52px;
}
#controls{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.ctrl{
  padding:9px 26px;border:none;border-radius:8px;cursor:pointer;
  font-size:.9rem;font-weight:700;transition:all .15s;
}
#btn-prev{background:#eef0fa;color:#555;border:1.5px solid #c0c8e8}
#btn-prev:hover:not(:disabled){background:#d8dcf0;color:#222}
#btn-prev:disabled{opacity:.35;cursor:default}
#btn-next{background:#4f5ff8;color:#fff}
#btn-next:hover:not(:disabled){background:#6472fa}
#btn-next:disabled{opacity:.35;cursor:default}
#btn-play{background:#43a047;color:#fff}
#btn-play:hover:not(:disabled){background:#56b25a}
#btn-play:disabled{opacity:.35;cursor:default}
#dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#c8cce8;cursor:pointer;transition:all .2s}
.dot.active{background:#4f5ff8;transform:scale(1.3)}
</style>
</head>
<body>

<div id="topbar">
  <h1>PagedAttention Algorithm</h1>
  <span id="step-pill">Step 1 / 14</span>
</div>

<div id="stage">
  <div id="left-panel">
    <div class="panel-label">Requests</div>
    <!-- cards injected by JS -->
  </div>
  <div id="divider"></div>
  <div id="right-panel">
    <div>
      <div class="panel-label">Free Block Pool <span style="font-size:9px;color:#bbb;text-transform:none;letter-spacing:0;font-weight:400">(simplified: 16 blocks × 4 slots; real vLLM default: thousands of blocks × 16 tokens/block)</span></div>
      <div id="free-pool"><!-- chips injected by JS --></div>
    </div>
    <div class="sep"></div>
    <div id="grid-header">
      <div class="panel-label" style="margin:0">Physical Memory Grid</div>
      <span id="grid-note">4 KV slots / block</span>
    </div>
    <div id="phys-grid"><!-- blocks injected by JS --></div>
  </div>
</div>

<div id="desc-box"></div>
<div id="controls">
  <button class="ctrl" id="btn-prev">← Prev</button>
  <div id="dots"></div>
  <button class="ctrl" id="btn-next">Next →</button>
  <button class="ctrl" id="btn-play">▶ Play All</button>
</div>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
const raf  = () => new Promise(r => requestAnimationFrame(r));
const raf2 = () => raf().then(raf);
const sleep = ms => new Promise(r => setTimeout(r, ms));

const stage      = document.getElementById('stage');
const leftPanel  = document.getElementById('left-panel');
const gridEl     = document.getElementById('phys-grid');
const freePoolEl = document.getElementById('free-pool');

// ── Build free pool chips ──────────────────────────────────────────────────────
for (let i = 0; i < 16; i++) {
  const chip = document.createElement('div');
  chip.className = 'fp-chip';
  chip.id = `fpc${i}`;
  chip.textContent = `P${i}`;
  freePoolEl.appendChild(chip);
}

// ── Build physical grid ────────────────────────────────────────────────────────
for (let i = 0; i < 16; i++) {
  const b = document.createElement('div');
  b.className = 'pb';
  b.id = `pb${i}`;
  b.innerHTML = `
    <div class="pb-head">
      <span class="pb-id">P${i}</span>
      <span class="pb-owner" id="pbo${i}"></span>
    </div>
    <div class="kv-grid">
      ${[0,1,2,3].map(s=>`<div class="kv-slot" id="pvs${i}_${s}"></div>`).join('')}
    </div>`;
  gridEl.appendChild(b);
}

// ── Build request cards ────────────────────────────────────────────────────────
const TOK_COLORS = ['#e53935','#f57c00','#43a047','#1e88e5','#8e24aa','#c2185b','#00838f'];

function buildCard(req, label, nTok, lbs) {
  const card = document.createElement('div');
  card.className = `req-card ${req}`;
  card.id = `card-${req}`;

  let toks = '';
  for (let i = 0; i < nTok; i++) {
    const c = TOK_COLORS[i % TOK_COLORS.length];
    toks += `<div class="tok" id="tok-${req}-${i}" style="color:${c};border-color:${c};background:${c}18">T${i+1}</div>`;
  }

  let rows = '';
  lbs.forEach(lb => {
    rows += `<div class="bt-row" id="btr-${req}-${lb}">
      <span class="bt-lb">LB${lb}</span>
      <span class="bt-arr">→</span>
      <span class="bt-pb" id="btp-${req}-${lb}">—</span>
    </div>`;
  });

  card.innerHTML = `
    <div class="req-title">${label}</div>
    <div class="tokens-row">${toks}</div>
    <div class="bt-section-label">Block Table</div>
    ${rows}`;
  return card;
}

const cardR1 = buildCard('r1', 'Request 1  (7 tokens)', 7, [0, 1]);
const cardR2 = buildCard('r2', 'Request 2  (6 tokens)', 6, [0, 1]);
leftPanel.appendChild(cardR1);
leftPanel.appendChild(cardR2);

// ── Animation helpers ─────────────────────────────────────────────────────────

async function showCard(req, tokDelay = 55) {
  const card = document.getElementById(`card-${req}`);
  card.classList.add('show');
  await sleep(150);
  const toks = card.querySelectorAll('.tok');
  for (let i = 0; i < toks.length; i++) {
    toks[i].classList.add('show');
    if (i < toks.length - 1) await sleep(tokDelay);
  }
}

// Fly a block chip from the free pool to its position in the physical grid
async function flyAllocate(req, lbIdx, pbId) {
  const color  = req === 'r1' ? '#1e88e5' : '#f57c00';
  const fromEl = document.getElementById(`fpc${pbId}`);
  const toEl   = document.getElementById(`pb${pbId}`);

  const stRect   = stage.getBoundingClientRect();
  const fromRect = fromEl.getBoundingClientRect();
  const toRect   = toEl.getBoundingClientRect();

  // Create floater at free pool chip position
  const fl = document.createElement('div');
  fl.className = 'floater';
  fl.textContent = `P${pbId}`;
  fl.style.cssText = `
    left:${fromRect.left - stRect.left}px;
    top:${fromRect.top  - stRect.top}px;
    width:${fromRect.width}px;
    height:${fromRect.height}px;
    background:${color}22;
    border:2px solid ${color};
    color:${color};
    opacity:0;
  `;
  stage.appendChild(fl);
  fromEl.classList.add('gone'); // fade out original chip

  await raf2();
  fl.style.opacity = '1';
  await raf2();

  // Morph and fly to physical block position
  fl.style.left         = `${toRect.left   - stRect.left}px`;
  fl.style.top          = `${toRect.top    - stRect.top}px`;
  fl.style.width        = `${toRect.width}px`;
  fl.style.height       = `${toRect.height}px`;
  fl.style.borderRadius = '8px';

  await sleep(720);

  // Activate block
  const blk = document.getElementById(`pb${pbId}`);
  blk.classList.add(req, 'pulse', 'new-glow');
  document.getElementById(`pbo${pbId}`).textContent =
    req === 'r1' ? `R1·LB${lbIdx}` : `R2·LB${lbIdx}`;
  fl.remove();

  await sleep(400);
  blk.classList.remove('new-glow', 'pulse');

  // Update block table entry
  const btpEl = document.getElementById(`btp-${req}-${lbIdx}`);
  btpEl.textContent = `P${pbId}`;
  btpEl.classList.add('set', req);
}

// Fill one KV slot, highlighting the corresponding token in the request card
async function fillOneSlot(pbId, slotIdx, req, tokenIdx) {
  // Pulse the token chip
  const tokEl = document.getElementById(`tok-${req}-${tokenIdx}`);
  if (tokEl) {
    tokEl.classList.add('highlight');
    await sleep(380);
    tokEl.classList.remove('highlight');
  }

  // Pop the KV slot in
  const slot = document.getElementById(`pvs${pbId}_${slotIdx}`);
  slot.textContent = `T${tokenIdx + 1}`;
  slot.classList.add('filled', 'pop');
  slot.addEventListener('animationend', () => slot.classList.remove('pop'), { once: true });
  await sleep(160);
}

// Batch fill multiple slots quickly (used for Request 2 to avoid repetition)
async function fillSlotsBatch(pbId, count, startTokIdx, delayMs = 130) {
  for (let s = 0; s < count; s++) {
    const slot = document.getElementById(`pvs${pbId}_${s}`);
    slot.textContent = `T${startTokIdx + s + 1}`;
    slot.classList.add('filled', 'pop');
    slot.addEventListener('animationend', () => slot.classList.remove('pop'), { once: true });
    if (s < count - 1) await sleep(delayMs);
  }
}

// ── Instant state restore (no animations) ────────────────────────────────────
function resetAll() {
  stage.querySelectorAll('.floater').forEach(f => f.remove());
  for (let i = 0; i < 16; i++) {
    const b = document.getElementById(`pb${i}`);
    b.className = 'pb';
    b.style = '';
    document.getElementById(`pbo${i}`).textContent = '';
    for (let s = 0; s < 4; s++) {
      const sl = document.getElementById(`pvs${i}_${s}`);
      sl.className = 'kv-slot';
      sl.textContent = '';
    }
    document.getElementById(`fpc${i}`).classList.remove('gone');
  }
  [cardR1, cardR2].forEach(c => {
    c.classList.remove('show');
    c.querySelectorAll('.tok').forEach(t => t.classList.remove('show', 'highlight'));
  });
  ['r1','r2'].forEach(req => [0,1].forEach(lb => {
    const el = document.getElementById(`btp-${req}-${lb}`);
    if (el) { el.textContent = '—'; el.className = 'bt-pb'; }
  }));
}

function setBlkInst(id, req, lbl) {
  const b = document.getElementById(`pb${id}`);
  b.classList.add(req);
  document.getElementById(`pbo${id}`).textContent = lbl;
}
function fillSlotInst(pbId, slotIdx, label) {
  const sl = document.getElementById(`pvs${pbId}_${slotIdx}`);
  sl.textContent = label;
  sl.classList.add('filled');
}
function setBtpInst(req, lb, pb) {
  const el = document.getElementById(`btp-${req}-${lb}`);
  el.textContent = `P${pb}`; el.classList.add('set', req);
}
function markGone(pbId) {
  document.getElementById(`fpc${pbId}`).classList.add('gone');
}
function highlightFreeInst() {
  for (let i = 0; i < 16; i++) {
    const b = document.getElementById(`pb${i}`);
    if (!b.classList.contains('r1') && !b.classList.contains('r2')) {
      b.style.borderColor = '#43a047';
      b.style.borderStyle = 'dashed';
      b.style.background  = '#f0fff4';
    }
  }
}

// applyInstant(n): instantly restore cumulative state as if steps 0..n have completed
function applyInstant(n) {
  // Step 1: R1 card
  if (n >= 1) {
    cardR1.classList.add('show');
    cardR1.querySelectorAll('.tok').forEach(t => t.classList.add('show'));
  }
  // Step 2: allocate P2 → R1 LB0
  if (n >= 2) { setBlkInst(2,'r1','R1·LB0'); setBtpInst('r1',0,2); markGone(2); }
  // Steps 3–6: fill P2 slots T1–T4
  for (let s = 0; s < 4; s++) {
    if (n >= 3 + s) fillSlotInst(2, s, `T${s+1}`);
  }
  // Step 7: allocate P9 → R1 LB1
  if (n >= 7) { setBlkInst(9,'r1','R1·LB1'); setBtpInst('r1',1,9); markGone(9); }
  // Steps 8–10: fill P9 slots T5–T7
  for (let s = 0; s < 3; s++) {
    if (n >= 8 + s) fillSlotInst(9, s, `T${s+5}`);
  }
  // Step 11: R2 card + allocate P5, P13
  if (n >= 11) {
    cardR2.classList.add('show');
    cardR2.querySelectorAll('.tok').forEach(t => t.classList.add('show'));
    setBlkInst(5,'r2','R2·LB0');  setBtpInst('r2',0,5);  markGone(5);
    setBlkInst(13,'r2','R2·LB1'); setBtpInst('r2',1,13); markGone(13);
  }
  // Step 12: fill R2 blocks
  if (n >= 12) {
    for (let s = 0; s < 4; s++) fillSlotInst(5,  s, `T${s+1}`);
    for (let s = 0; s < 2; s++) fillSlotInst(13, s, `T${s+5}`);
  }
  // Step 13: highlight free blocks
  if (n >= 13) { highlightFreeInst(); }
}

// ── Steps ─────────────────────────────────────────────────────────────────────
const STEPS = [
  {
    desc: 'GPU memory is pre-divided into 16 physical blocks, each holding 4 KV-vector slots (one slot = one token\'s K+V vectors). All 16 chips in the Free Pool above are available. Note: these numbers are simplified — vLLM\'s default is 16 tokens/block and thousands of blocks per GPU.',
    async run() {}
  },
  {
    desc: 'Request 1 arrives with a 7-token prompt. The block table creates two logical block entries: LB0 will hold tokens T1–T4, LB1 will hold T5–T7. No physical memory is touched yet.',
    async run() { await showCard('r1'); }
  },
  {
    desc: 'LB0 needs a physical block. P2 is popped from the free pool — watch its chip fly down to its slot in the memory grid. The block table records LB0 → P2.',
    async run() { await flyAllocate('r1', 0, 2); }
  },
  {
    desc: 'T1 is processed. Its Key vector K₁ and Value vector V₁ are stored into P2\'s first slot. This is the KV cache: future attention over T1 reads these cached vectors instead of recomputing them.',
    async run() { await fillOneSlot(2, 0, 'r1', 0); }
  },
  {
    desc: 'T2 → P2 slot 1. K₂ and V₂ are cached. P2 is now 2/4 full. During generation, attending to any past token is O(1) memory read — no recomputation.',
    async run() { await fillOneSlot(2, 1, 'r1', 1); }
  },
  {
    desc: 'T3 → P2 slot 2. P2 is 3/4 full.',
    async run() { await fillOneSlot(2, 2, 'r1', 2); }
  },
  {
    desc: 'T4 → P2 slot 3. P2 is now completely full (4/4). The next token cannot fit here — a new physical block must be allocated.',
    async run() { await fillOneSlot(2, 3, 'r1', 3); }
  },
  {
    desc: 'P2 is full, so P9 is popped from the free pool for LB1. P9 is not adjacent to P2 — physical blocks can be scattered anywhere. The block table entry LB1 → P9 handles all address translation transparently.',
    async run() { await flyAllocate('r1', 1, 9); }
  },
  {
    desc: 'T5 → P9 slot 0. Execution crosses a block boundary seamlessly: the attention kernel looks up LB1 → P9 in the block table and reads K₅V₅ from P9.',
    async run() { await fillOneSlot(9, 0, 'r1', 4); }
  },
  {
    desc: 'T6 → P9 slot 1.',
    async run() { await fillOneSlot(9, 1, 'r1', 5); }
  },
  {
    desc: 'T7, the last prompt token, fills P9\'s third slot. P9 has one empty slot remaining — reserved for the first generated token. No pre-allocation needed for the rest of the potential sequence.',
    async run() { await fillOneSlot(9, 2, 'r1', 6); }
  },
  {
    desc: 'Request 2 arrives with 6 tokens and gets P5 (LB0) and P13 (LB1) from the free pool. These blocks are scattered and non-contiguous. Each request has its own isolated block table — no interference between requests.',
    async run() {
      await showCard('r2');
      await flyAllocate('r2', 0, 5);
      await flyAllocate('r2', 1, 13);
    }
  },
  {
    desc: 'Request 2\'s tokens fill P5 completely (T1–T4, 4/4) and P13 partially (T5–T6, 2/4). Two concurrent requests, blocks scattered anywhere in GPU memory, all tracked by per-request block tables.',
    async run() {
      await fillSlotsBatch(5,  4, 0, 130);
      await fillSlotsBatch(13, 2, 4, 130);
    }
  },
  {
    desc: 'Result: 4 blocks in use, 12 still free (shown in green). Contiguous allocation would pre-reserve max_seq_len blocks per request regardless of actual usage — wasting 60–80% of GPU memory. PagedAttention\'s paging eliminates this waste, enabling ~3× higher inference throughput.',
    async run() { highlightFreeInst(); }
  },
];

// ── Navigation engine ─────────────────────────────────────────────────────────
let cur = 0;
let busy = false;
let playActive = false;

async function goTo(n) {
  if (busy || n < 0 || n >= STEPS.length) return;
  busy = true;
  setUI(false);

  if (n <= cur) {
    resetAll();
    applyInstant(n);
  } else {
    if (n - cur > 1) { resetAll(); applyInstant(n - 1); }
    await STEPS[n].run();
  }

  cur = n;
  busy = false;
  updateUI();
}

async function playAll() {
  if (busy) return;
  playActive = true;
  document.getElementById('btn-play').textContent = '■ Stop';
  document.getElementById('btn-play').style.background = '#e53935';
  document.getElementById('btn-play').onclick = stopPlay;

  while (cur < STEPS.length - 1 && playActive) {
    await goTo(cur + 1);
    await sleep(900);
  }
  endPlay();
}

function stopPlay() { playActive = false; endPlay(); }
function endPlay() {
  playActive = false;
  const btn = document.getElementById('btn-play');
  btn.textContent = '▶ Play All';
  btn.style.background = '#43a047';
  btn.onclick = playAll;
  updateUI();
}

function setUI(enabled) {
  ['btn-prev','btn-next','btn-play'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}

function updateUI() {
  document.getElementById('step-pill').textContent = `Step ${cur + 1} / ${STEPS.length}`;
  document.getElementById('desc-box').textContent  = STEPS[cur].desc;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').disabled = cur === STEPS.length - 1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === cur));
}

// Dots
STEPS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => { stopPlay(); goTo(i); });
  document.getElementById('dots').appendChild(d);
});

document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); goTo(cur - 1); });
document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); goTo(cur + 1); });
document.getElementById('btn-play').addEventListener('click', playAll);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); stopPlay(); goTo(cur + 1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); stopPlay(); goTo(cur - 1); }
});

updateUI();
</script>
</body>
</html>
