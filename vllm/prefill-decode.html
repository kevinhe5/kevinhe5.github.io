<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prefill vs Decode — LLM Inference Phases</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef0fc;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 32px}

#topbar{display:flex;align-items:center;justify-content:space-between;width:calc(100vw - 32px);max-width:100%;margin-bottom:14px}
#topbar-left{display:flex;align-items:center;gap:14px}
h1{font-size:1.2rem;color:#1a1d3e;font-weight:700}
#step-pill{background:#4f5ff8;color:#fff;font-size:.76rem;font-weight:700;padding:5px 14px;border-radius:20px}
.home-btn{font-size:.82rem;color:#4f5ff8;text-decoration:none;font-weight:700;padding:5px 12px;border:1.5px solid #c0c8e8;border-radius:7px;background:#eef0fc}

#stage{
  position:relative;
  width:calc(100vw - 32px);max-width:100%;height:calc(100vh - 230px);
  background:#fff;border-radius:16px;
  box-shadow:0 4px 32px #1a1d3e1a;
  display:flex;overflow:hidden;
}

/* Left panel — token list */
#left-panel{
  width:230px;flex-shrink:0;padding:15px;
  display:flex;flex-direction:column;gap:6px;
  border-right:1px solid #e8eaf6;
}
.panel-label{font-size:10px;font-weight:700;color:#aab;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}

.tok-row{
  display:flex;align-items:center;gap:7px;
  padding:5px 8px;border-radius:7px;
  opacity:0;transform:translateX(-10px);
  transition:opacity 280ms ease, transform 280ms ease, background 200ms ease;
}
.tok-row.show{opacity:1;transform:translateX(0)}
.tok-row.reading{background:#fff9e6;animation:rowPulse 600ms ease-out}
@keyframes rowPulse{0%{background:#ffe082}100%{background:#fff9e6}}

.tok-chip{
  padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;border:1.2px solid;
  flex-shrink:0;
}
.tok-label{font-size:9px;color:#888}
.tok-row.generated .tok-chip{background:#e8f5e9;border-color:#43a047;color:#2e7d32}
.tok-row.generated .tok-label{color:#43a047;font-weight:600}

/* Phase badge */
#phase-badge{
  display:flex;align-items:center;justify-content:center;
  padding:4px 14px;border-radius:20px;
  font-size:11px;font-weight:800;letter-spacing:.5px;
  margin-top:auto;
  opacity:0;transition:opacity 400ms ease, background 400ms ease, color 400ms ease;
}
#phase-badge.show{opacity:1}
#phase-badge.prefill{background:#dbeeff;color:#1565c0}
#phase-badge.decode{background:#e8f5e9;color:#1b5e20}

/* Right panel */
#right-panel{flex:1;padding:15px;display:flex;flex-direction:column;gap:8px}

/* GPU Util bar */
#util-section{flex-shrink:0}
#util-bar-wrap{
  height:28px;background:#f0f2fa;border-radius:8px;overflow:hidden;
  border:1.5px solid #e0e4f0;margin-top:4px;position:relative;
}
#util-bar{
  height:100%;width:0%;
  border-radius:7px;
  transition:width 800ms cubic-bezier(.4,0,.2,1), background 400ms ease;
  display:flex;align-items:center;justify-content:flex-end;padding-right:10px;
}
#util-label{font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
#util-pct{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:10px;font-weight:700;color:#aaa;
  transition:opacity 300ms;
}

/* Bottleneck label */
#bottleneck{
  font-size:10px;font-weight:700;
  padding:2px 10px;border-radius:5px;margin-top:4px;
  display:inline-block;opacity:0;transition:opacity 400ms ease;
}
#bottleneck.show{opacity:1}
#bottleneck.compute{background:#dbeeff;color:#1565c0}
#bottleneck.membw{background:#fff3e0;color:#e65100}

/* KV reads indicator */
#reads-section{flex-shrink:0}
#reads-bar{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;min-height:20px}
.read-pip{
  width:18px;height:18px;border-radius:3px;
  background:#e4e8f4;
  transition:background 200ms ease;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:700;color:transparent;
}
.read-pip.active{background:#f59e0b;color:#fff}

/* KV grid */
#grid-section{flex:1;display:flex;flex-direction:column;gap:4px}
#phys-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;flex:1;
}
.pb{
  border-radius:7px;border:1.5px solid #d4d8f0;background:#f5f6fc;
  padding:5px 6px;display:flex;flex-direction:column;gap:3px;
  transition:background 350ms ease, border-color 350ms ease, box-shadow 350ms ease;
}
.pb.owned{background:#dbeeff;border-color:#1e88e5}
.pb.pulse{animation:blkPulse 500ms ease-out}
@keyframes blkPulse{0%{transform:scale(1)}45%{transform:scale(1.06)}100%{transform:scale(1)}}
.pb-head{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pb-id{font-size:8px;font-weight:700;color:#bbb}
.pb.owned .pb-id{color:#1e88e5}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;flex:1}
.kv-slot{
  border-radius:3px;background:#e4e8f4;min-height:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:6px;font-weight:700;color:transparent;
  transition:background 200ms ease, color 150ms ease;
}
.kv-slot.filled{background:#1e88e5;color:#fff}
.kv-slot.pop{animation:slotPop 300ms cubic-bezier(.34,1.56,.64,1)}
@keyframes slotPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.kv-slot.reading{animation:slotRead 500ms ease-out}
@keyframes slotRead{0%{background:#f59e0b}60%{background:#f59e0b}100%{background:#1e88e5}}

/* Floating chip */
.floater{
  position:absolute;z-index:200;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;pointer-events:none;
  box-shadow:0 4px 16px #0002;
  transition:left 680ms cubic-bezier(.25,.8,.25,1),top 680ms cubic-bezier(.25,.8,.25,1),
    width 680ms cubic-bezier(.25,.8,.25,1),height 680ms cubic-bezier(.25,.8,.25,1),
    border-radius 680ms ease,opacity 200ms ease;
}

/* Controls */
#desc-box{width:calc(100vw - 32px);max-width:100%;margin-top:12px;padding:12px 18px;background:#fff;
  border-radius:10px;border-left:4px solid #2e7d32;box-shadow:0 2px 10px #1a1d3e0d;
  font-size:.86rem;line-height:1.65;color:#2a2d4e;min-height:52px}
#controls{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.ctrl{padding:9px 26px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;transition:all .15s}
#btn-prev{background:#eef0fa;color:#555;border:1.5px solid #c0c8e8}
#btn-prev:hover:not(:disabled){background:#d8dcf0;color:#222}
#btn-prev:disabled{opacity:.35;cursor:default}
#btn-next{background:#4f5ff8;color:#fff}
#btn-next:hover:not(:disabled){background:#6472fa}
#btn-next:disabled{opacity:.35;cursor:default}
#btn-play{background:#43a047;color:#fff}
#btn-play:hover:not(:disabled){background:#56b25a}
#btn-play:disabled{opacity:.35;cursor:default}
#btn-reset{background:#eef0fa;color:#555;border:1.5px solid #c0c8e8}
#btn-reset:hover{background:#d8dcf0;color:#222}
#dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#c8cce8;cursor:pointer;transition:all .2s}
.dot.active{background:#4f5ff8;transform:scale(1.3)}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <a class="home-btn" href="index.html">← Home</a>
    <h1>Prefill vs. Decode</h1>
  </div>
  <span id="step-pill">Step 1 / 9</span>
</div>

<div id="stage">
  <!-- Left: token list -->
  <div id="left-panel">
    <div class="panel-label">Token Sequence</div>
    <!-- rows injected by JS -->
    <div id="phase-badge">PREFILL</div>
  </div>

  <!-- Right: metrics + KV cache -->
  <div id="right-panel">
    <div id="util-section">
      <div class="panel-label">GPU Utilization</div>
      <div id="util-bar-wrap">
        <div id="util-bar"><span id="util-label"></span></div>
        <span id="util-pct"></span>
      </div>
      <div id="bottleneck"></div>
    </div>

    <div id="reads-section">
      <div class="panel-label">KV Pairs Read This Step <span id="reads-count" style="font-size:9px;color:#888;text-transform:none;letter-spacing:0;font-weight:400"></span></div>
      <div id="reads-bar"><!-- pips injected by JS --></div>
    </div>

    <div id="grid-section">
      <div class="panel-label">KV Cache</div>
      <div id="phys-grid"><!-- blocks injected by JS --></div>
    </div>
  </div>
</div>

<div id="desc-box"></div>
<div id="controls">
  <button class="ctrl" id="btn-prev">← Prev</button>
  <div id="dots"></div>
  <button class="ctrl" id="btn-next">Next →</button>
  <button class="ctrl" id="btn-play">▶ Play All</button>
  <button class="ctrl" id="btn-reset">↺ Reset</button>
</div>

<script>
const raf   = () => new Promise(r => requestAnimationFrame(r));
const raf2  = () => raf().then(raf);
const sleep = ms => new Promise(r => setTimeout(r, ms));

const stage = document.getElementById('stage');
const leftPanel = document.getElementById('left-panel');
const gridEl = document.getElementById('phys-grid');
const readsBar = document.getElementById('reads-bar');

// ── Token sequence ─────────────────────────────────────────────────────────
const PROMPT_TOKS = ['The','quick','brown','fox','jumps','over'];
const GEN_TOKS    = ['the','lazy','dog','quickly','ran','away'];
const TOK_COLORS  = ['#e53935','#f57c00','#8e24aa','#1e88e5','#00838f','#2e7d32'];

const phaseBadge = document.getElementById('phase-badge');

PROMPT_TOKS.forEach((word, i) => {
  const row = document.createElement('div');
  row.className = 'tok-row';
  row.id = `trow-p${i}`;
  const c = TOK_COLORS[i];
  row.innerHTML = `<span class="tok-chip" style="color:${c};border-color:${c};background:${c}18">T${i+1}</span>
    <span class="tok-label">"${word}"  <span style="font-size:8px;color:#ccc">prompt</span></span>`;
  leftPanel.insertBefore(row, phaseBadge);
});

GEN_TOKS.forEach((word, i) => {
  const row = document.createElement('div');
  row.className = 'tok-row generated';
  row.id = `trow-g${i}`;
  row.innerHTML = `<span class="tok-chip">T${PROMPT_TOKS.length + i + 1}</span>
    <span class="tok-label">"${word}"  <span style="font-size:8px;color:#9aca3b;font-weight:700">generated</span></span>`;
  leftPanel.insertBefore(row, phaseBadge);
});

// ── KV reads pips (max 12 shown) ──────────────────────────────────────────
const MAX_PIPS = 12;
for (let i = 0; i < MAX_PIPS; i++) {
  const pip = document.createElement('div');
  pip.className = 'read-pip';
  pip.id = `pip${i}`;
  readsBar.appendChild(pip);
}

function setReadPips(n) {
  const shown = Math.min(n, MAX_PIPS);
  document.getElementById('reads-count').textContent = n > 0 ? `(${n} pairs)` : '';
  for (let i = 0; i < MAX_PIPS; i++) {
    const pip = document.getElementById(`pip${i}`);
    pip.className = 'read-pip' + (i < shown ? ' active' : '');
    pip.textContent = '';
  }
}

// ── Physical KV grid (2 blocks × 4 slots each) ───────────────────────────
for (let i = 0; i < 3; i++) {
  const b = document.createElement('div');
  b.className = 'pb';
  b.id = `pb${i}`;
  b.innerHTML = `
    <div class="pb-head"><span class="pb-id">P${i}</span></div>
    <div class="kv-grid">${[0,1,2,3].map(s=>`<div class="kv-slot" id="pvs${i}_${s}"></div>`).join('')}</div>`;
  gridEl.appendChild(b);
}
// One empty block to fill the 4-col grid visually
for (let i = 3; i < 4; i++) {
  const b = document.createElement('div');
  b.style.cssText = 'visibility:hidden';
  gridEl.appendChild(b);
}

// ── GPU Util bar ───────────────────────────────────────────────────────────
function setUtil(pct, color, label, bottleneck) {
  const bar = document.getElementById('util-bar');
  const pctEl = document.getElementById('util-pct');
  const btEl = document.getElementById('bottleneck');

  bar.style.width = pct + '%';
  bar.style.background = color;
  document.getElementById('util-label').textContent = pct > 20 ? `${pct}%` : '';
  pctEl.style.opacity = pct < 20 ? '1' : '0';
  pctEl.textContent = pct > 0 ? `${pct}%` : '';

  if (bottleneck) {
    btEl.textContent = bottleneck.text;
    btEl.className = 'bottleneck show ' + bottleneck.cls;
  } else {
    btEl.className = 'bottleneck';
  }
}

// ── Animation helpers ──────────────────────────────────────────────────────
async function showTokRow(id, delay = 0) {
  if (delay) await sleep(delay);
  document.getElementById(id).classList.add('show');
}

async function showAllPrompt() {
  for (let i = 0; i < PROMPT_TOKS.length; i++) {
    await showTokRow(`trow-p${i}`, i === 0 ? 0 : 60);
  }
}

// Fill all prompt KV slots in one burst (prefill)
async function prefillBurst() {
  for (let i = 0; i < 2; i++) document.getElementById(`pb${i}`).classList.add('owned');
  const slots = [];
  for (let i = 0; i < 2; i++)
    for (let s = 0; s < 4; s++) slots.push(`pvs${i}_${s}`);
  // Show them all at once with slight stagger
  slots.forEach((id, idx) => {
    setTimeout(() => {
      const sl = document.getElementById(id);
      sl.textContent = `T${idx+1}`;
      sl.classList.add('filled','pop');
      sl.addEventListener('animationend',()=>sl.classList.remove('pop'),{once:true});
    }, idx * 35);
  });
  await sleep(35 * slots.length + 200);
}

// Show "reading" animation on all filled slots (decode attention)
async function showReads(nSlots) {
  setReadPips(nSlots);
  const ids = [];
  for (let i = 0; i < 3; i++)
    for (let s = 0; s < 4; s++) {
      const sl = document.getElementById(`pvs${i}_${s}`);
      if (sl.classList.contains('filled')) ids.push(`pvs${i}_${s}`);
    }
  const shown = ids.slice(0, nSlots);
  shown.forEach((id, idx) => {
    setTimeout(() => {
      const sl = document.getElementById(id);
      sl.classList.add('reading');
      sl.addEventListener('animationend',()=>sl.classList.remove('reading'),{once:true});
    }, idx * 40);
  });
  await sleep(shown.length * 40 + 300);
}

// Fill one new decode slot
async function decodeSlot(blockId, slotIdx, tokLabel) {
  const blk = document.getElementById(`pb${blockId}`);
  if (!blk.classList.contains('owned')) {
    blk.classList.add('owned','pulse');
    await sleep(200);
    blk.classList.remove('pulse');
  }
  const sl = document.getElementById(`pvs${blockId}_${slotIdx}`);
  sl.textContent = tokLabel;
  sl.classList.add('filled','pop');
  sl.addEventListener('animationend',()=>sl.classList.remove('pop'),{once:true});
  await sleep(160);
}

// ── Reset + instant state ─────────────────────────────────────────────────
function resetAll() {
  for (let i = 0; i < 3; i++) {
    const b = document.getElementById(`pb${i}`);
    b.className = 'pb';
    for (let s = 0; s < 4; s++) {
      const sl = document.getElementById(`pvs${i}_${s}`);
      sl.className = 'kv-slot';
      sl.textContent = '';
    }
  }
  [...Array(PROMPT_TOKS.length)].forEach((_,i) => document.getElementById(`trow-p${i}`).classList.remove('show','reading'));
  [...Array(GEN_TOKS.length)].forEach((_,i) => document.getElementById(`trow-g${i}`).classList.remove('show','reading'));
  phaseBadge.className = 'phase-badge';
  setUtil(0,'#4f5ff8','','');
  setReadPips(0);
}

// Map: step index → cumulative state
// Slots: P0: T1-T4, P1: T5-T8, P2: T9+
function applyInstant(n) {
  if (n >= 1) PROMPT_TOKS.forEach((_,i) => document.getElementById(`trow-p${i}`).classList.add('show'));
  if (n >= 2) {
    phaseBadge.className = 'phase-badge show prefill';
    phaseBadge.textContent = 'PREFILL';
  }
  if (n >= 3) {
    for (let i = 0; i < 2; i++) {
      document.getElementById(`pb${i}`).classList.add('owned');
      for (let s = 0; s < 4; s++) {
        const sl = document.getElementById(`pvs${i}_${s}`);
        sl.textContent = `T${i*4+s+1}`;
        sl.classList.add('filled');
      }
    }
    setUtil(85,'#1e88e5','85%',{text:'Compute-bound  (matrix multiply)',cls:'compute'});
  }
  if (n >= 4) {
    phaseBadge.className = 'phase-badge show decode';
    phaseBadge.textContent = 'DECODE';
    setUtil(42,'#43a047','42%',{text:'Memory-bandwidth-bound  (reading KV cache)',cls:'membw'});
  }
  // generated tokens shown
  const genCount = Math.max(0, n - 4);
  for (let g = 0; g < genCount && g < GEN_TOKS.length; g++) {
    document.getElementById(`trow-g${g}`).classList.add('show');
  }
  // decode KV slots
  if (n >= 5) { instSlot(1,0,'T7'); setReadPips(6); }
  if (n >= 6) { instSlot(1,1,'T8'); setReadPips(7); }
  if (n >= 7) { instSlot(1,2,'T9'); setReadPips(8); }
  if (n >= 8) { instSlot(1,3,'T10'); instSlot(2,0,'T11'); setReadPips(9); }
}

function instSlot(b, s, label) {
  document.getElementById(`pb${b}`).classList.add('owned');
  const sl = document.getElementById(`pvs${b}_${s}`);
  sl.textContent = label; sl.classList.add('filled');
}

// ── Steps ─────────────────────────────────────────────────────────────────
const STEPS = [
  {
    desc: 'LLM inference has two distinct phases with very different performance characteristics. We\'ll process a 6-token prompt and watch how each phase works.',
    async run() {}
  },
  {
    desc: 'The prompt arrives: 6 tokens ("The quick brown fox jumps over"). Before any tokens can be generated, all of them must be processed to build the initial KV cache.',
    async run() { await showAllPrompt(); }
  },
  {
    desc: 'PREFILL begins. All 6 prompt tokens are fed into the model in a single forward pass simultaneously — this is the key: the GPU processes them in parallel.',
    async run() {
      phaseBadge.textContent = 'PREFILL';
      phaseBadge.className = 'phase-badge show prefill';
    }
  },
  {
    desc: 'All 6 KV pairs are written to the cache in one shot. Prefill is compute-bound (~85% GPU utilization) because it\'s dominated by large matrix multiplies (Q·Kᵀ across all token pairs simultaneously).',
    async run() {
      await prefillBurst();
      setUtil(85,'#1e88e5','85%',{text:'Compute-bound  (matrix multiply)',cls:'compute'});
    }
  },
  {
    desc: 'DECODE begins. The model generates one new token per iteration. GPU utilization drops (~42%) because we\'re now memory-bandwidth-bound: each step must READ the entire growing KV cache just to generate a single token.',
    async run() {
      phaseBadge.textContent = 'DECODE';
      phaseBadge.className = 'phase-badge show decode';
      setUtil(42,'#43a047','42%',{text:'Memory-bandwidth-bound  (reading KV cache)',cls:'membw'});
      await sleep(200);
      document.getElementById('trow-g0').classList.add('show');
    }
  },
  {
    desc: 'Decode step 1: to generate T7 ("the"), the model reads all 6 cached KV pairs — one per prompt token. Writing the new slot is fast; the bottleneck is reading the cache.',
    async run() {
      await showReads(6);
      await decodeSlot(1, 0, 'T7');
      document.getElementById('trow-g0').classList.add('show');
    }
  },
  {
    desc: 'Decode step 2: T8 requires reading 7 KV pairs (T1–T7). The memory bandwidth cost grows with sequence length — this is why long sequences get progressively slower to decode.',
    async run() {
      await showReads(7);
      await decodeSlot(1, 1, 'T8');
      document.getElementById('trow-g1').classList.add('show');
    }
  },
  {
    desc: 'Decode step 3: T9 requires reading 8 KV pairs. The first block (P0, T1–T4) and second block (P1) are both read. Notice: P1 was allocated by PagedAttention when P0 became full.',
    async run() {
      await showReads(8);
      await decodeSlot(1, 2, 'T9');
      document.getElementById('trow-g2').classList.add('show');
    }
  },
  {
    desc: 'Summary: Prefill processes N tokens in 1 step (compute-bound, high GPU util). Decode generates 1 token per step and must read the full KV cache each time (memory-bandwidth-bound). This asymmetry motivates batching many requests together during decode to amortize the memory reads.',
    async run() {
      setReadPips(0);
      await showReads(9);
      await decodeSlot(1, 3, 'T10');
      document.getElementById(`pb2`).classList.add('owned');
      await decodeSlot(2, 0, 'T11');
      document.getElementById('trow-g3').classList.add('show');
      document.getElementById('trow-g4').classList.add('show');
    }
  },
];

// ── Navigation ────────────────────────────────────────────────────────────
let cur = 0, busy = false, playActive = false;

async function goTo(n) {
  if (busy || n < 0 || n >= STEPS.length) return;
  busy = true; setUI(false);
  if (n <= cur) { resetAll(); applyInstant(n); }
  else {
    if (n - cur > 1) { resetAll(); applyInstant(n - 1); }
    await STEPS[n].run();
  }
  cur = n; busy = false; updateUI();
}

async function playAll() {
  if (busy) return;
  playActive = true;
  document.getElementById('btn-play').textContent = '■ Stop';
  document.getElementById('btn-play').style.background = '#e53935';
  document.getElementById('btn-play').onclick = stopPlay;
  while (cur < STEPS.length - 1 && playActive) { await goTo(cur + 1); await sleep(900); }
  endPlay();
}
function stopPlay() { playActive = false; endPlay(); }
function endPlay() {
  playActive = false;
  const btn = document.getElementById('btn-play');
  btn.textContent = '▶ Play All'; btn.style.background = '#43a047'; btn.onclick = playAll;
  updateUI();
}
function setUI(en) { ['btn-prev','btn-next','btn-play'].forEach(id => document.getElementById(id).disabled = !en); }
function updateUI() {
  document.getElementById('step-pill').textContent = `Step ${cur+1} / ${STEPS.length}`;
  document.getElementById('desc-box').textContent = STEPS[cur].desc;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length - 1;
  document.getElementById('btn-play').disabled = cur === STEPS.length - 1;
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === cur));
}

STEPS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  d.addEventListener('click', () => { stopPlay(); goTo(i); });
  document.getElementById('dots').appendChild(d);
});
document.getElementById('btn-prev').addEventListener('click', () => { stopPlay(); goTo(cur-1); });
document.getElementById('btn-next').addEventListener('click', () => { stopPlay(); goTo(cur+1); });
document.getElementById('btn-play').addEventListener('click', playAll);
document.getElementById('btn-reset').addEventListener('click', () => { stopPlay(); goTo(0); });
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' '){e.preventDefault();stopPlay();goTo(cur+1);}
  if (e.key==='ArrowLeft'){e.preventDefault();stopPlay();goTo(cur-1);}
});
updateUI();
</script>
</body>
</html>
